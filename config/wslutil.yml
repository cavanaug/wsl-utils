exes:
  ########################################
  # direct — symlink to Windows exe (no win-run overhead)
  ########################################
  cmd.exe:
    mode: direct
  powerShell.exe:
    mode: direct
  rundll32.exe:
    mode: direct
  ipconfig.exe:
    mode: direct
  net.exe:
    mode: direct
  netsh.exe:
    mode: direct
  systeminfo.exe:
    mode: direct
  taskkill.exe:
    mode: direct
  tasklist.exe:
    mode: direct
  code:
    mode: direct
    path: ${WIN_USERPROFILE}/AppData/Local/Programs/Microsoft VS Code/bin/code
  code-insiders:
    mode: direct
    path: ${WIN_USERPROFILE}/AppData/Local/Programs/Microsoft VS Code Insiders/bin/code-insiders
  brave.exe:
    mode: direct
    path: ${WIN_USERPROFILE}/AppData/Local/BraveSoftware/Brave-Browser/Application/brave.exe
  winget.exe:
    mode: direct
  gsudo.exe:
    mode: direct
  ########################################
  # shim — symlink to win-run (path convert + UTF-8)
  ########################################
  curl.exe:
    mode: shim
  subst.exe:
    mode: shim
  reg.exe:
    mode: shim
  regedit.exe:
    mode: shim
  taskmgr.exe:
    mode: shim
  wsl.exe:
    mode: shim
  notepad.exe:
    mode: shim
  notepad++.exe:
    mode: shim
  wt.exe:
    mode: shim
  devmgmt.msc:
    mode: shim
